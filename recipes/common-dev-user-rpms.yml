modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - mineiro/ghostty
    install:
      packages:
        - ghostty
        - podman-docker
        - podman-compose
        - podman-machine
        - podman-tui
        - make
        - cmake
        - strace
        - https://github.com/nekename/OpenDeck/releases/download/v2.12.0/opendeck-2.12.0-1.x86_64.rpm
        - wine
        - wine-mono
        - wireshark
        - wireshark-cli
